<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dice Manor</title>
  <meta name="description" content="DiceMannor is a haunted dice-and-card battler for iPad.">
  <style>
    :root {
      color-scheme: dark;
      --background: #120f14;
      --panel: #1f1824;
      --text: #f6efe3;
      --muted: #c8b8a8;
      --accent: #d7a64a;
      --line: #3b303f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--background);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }

    header {
      border-bottom: 1px solid var(--line);
      margin-bottom: 32px;
      padding-bottom: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 8vw, 4.4rem);
      line-height: 1;
    }

    h2 {
      margin-top: 36px;
      font-size: 1.3rem;
    }

    p,
    li {
      color: var(--muted);
      font-size: 1.05rem;
    }

    a {
      color: var(--accent);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    nav a {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Dice Manor</h1>
      <p>A haunted dice-and-card battler for iPad.</p>
      <nav aria-label="Site links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
      </nav>
    </header>

    <section>
      <h2>About</h2>
      <p>Choose a hero, roll dice, place them onto ability cards, and survive the haunted manor one battle at a time.</p>
      <p>Dice Manor is designed as an offline iPad game with local progress storage.</p>
    </section>
  </main>
</body>
</html>
